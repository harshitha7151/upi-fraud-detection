<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TransactFlow – Pay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='styles/style.css') }}">
</head>

<body class="app-body">

<div class="phone-frame">

    <!-- TOP BAR -->
    <header class="top-bar">
        <div class="user-info">
            <div class="avatar-circle glow-avatar">TF</div>
            <div>
                <p class="user-name">UPI Payment</p>
                <p class="user-mail">upi-simulation</p>
            </div>
        </div>
        <span class="sim-pill">SIMULATION ONLY</span>
    </header>

    <!-- MAIN CONTENT -->
    <main class="screen-content">

        <!-- BALANCE -->
        <section class="card balance-card">
            <p class="balance-label">Demo Wallet</p>
            <p class="balance-amount">₹ 25,000.00</p>
        </section>

        <!-- PAYMENT FORM -->
        <section class="card section-card">
            <p class="section-title">UPI Payment Simulation</p>

            <form id="payForm" class="pay-form">

                <label>Sender UPI (Fake)</label>
                <input id="senderUpi" placeholder="yourname@upi" required>

                <label>Receiver UPI</label>
                <input id="receiverUpi" placeholder="merchant@upi" required>

                <label>Amount</label>
                <input id="amount" type="number" min="1" placeholder="₹ Amount" required>

                <label class="checkbox-row">
                    <input type="checkbox" id="simulateVpn">
                    Simulate VPN
                </label>

                <button class="primary-cta" style="margin-top:16px;">
                    Pay (Simulation)
                </button>

            </form>
        </section>

        <!-- LOADING VIDEO -->
        <div id="loadingSection" class="processing hidden">
            <video autoplay loop muted class="loading-gif">
                <source src="{{ url_for('static', filename='assets/loading.mp4') }}" type="video/mp4">
            </video>
            <p style="opacity:0.7;margin-top:8px;">Processing transaction…</p>
        </div>

        <!-- RESULT SECTION -->
        <div id="resultSection" class="result hidden">
            <div class="result-card">

                <video id="resultVideo" autoplay muted class="result-icon">
                    <!-- src set dynamically -->
                </video>

                <h3 id="resultTitle"></h3>
                <p id="fraudReason" class="fraud-text"></p>

            </div>
        </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item">Home</a>
        <a href="/pay" class="nav-item active">Pay</a>
        <a href="/history-page" class="nav-item">History</a>
    </nav>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='scripts/app.js') }}"></script>

</body>
</html>
